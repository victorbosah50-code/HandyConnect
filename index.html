<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HandyConnect Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🔧 HandyConnect Pro</h1>
  <p>Find the nearest trusted handyman instantly</p>
</header>

<section class="controls">
  <button onclick="getUserLocation()">📍 Detect My Location</button>

  <select id="filterSkill" onchange="displayHandymen()">
    <option value="">All Skills</option>
    <option value="Plumbing">Plumbing</option>
    <option value="Electrical">Electrical</option>
    <option value="Carpentry">Carpentry</option>
  </select>
</section>

<section>
  <h2>Available Handymen</h2>
  <div id="handymanList"></div>
</section>

<script src="script.js"></script>
</body>
</html>
